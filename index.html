<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>3D Animated Solar System</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body>
    <a-scene>
      <!-- ASSETS -->
      <a-assets>
        <img id="sun" src="texture/2k_sun.jpg">
        <img id="mercury" src="texture/2k_mercury.jpg">
        <img id="venus" src="texture/2k_venus_surface.jpg">
        <img id="earth" src="texture/2k_earth_daymap.jpg">
        <img id="earth_normal" src="texture/2k_earth_normal.jpg">
        <img id="moon" src="texture/2k_moon.jpg">
        <img id="mars" src="texture/2k_mars.jpg">
        <img id="jupiter" src="texture/2k_jupiter.jpg">
        <img id="saturn" src="texture/2k_saturn.jpg">
        <img id="saturn_ring" src="texture/2k_saturn_ring_alpha.png">
        <img id="uranus" src="texture/2k_uranus.jpg">
        <img id="neptune" src="texture/2k_neptune.jpg">
        <img id="stars" src="texture/2k_stars_milky_way.jpg">
      </a-assets>

      <!-- ENVIRONMENT -->
      <a-sky src="#stars"></a-sky>

      <!-- LIGHTING -->
      <a-light type="ambient" color="#ffffff" intensity="0.2"></a-light>

      <!-- CAMERA RIG -->
      <!-- Positioned high and rotated down to clearly view all planets -->
      <a-entity position="0 60 90" rotation="-35 0 0">
        <a-camera fov="60" near="0.1" far="1000"></a-camera>
      </a-entity>

      <!-- SOLAR SYSTEM CENTER -->
      
      <!-- Sun -->
      <a-entity position="0 0 0">
        <!-- Sun Sphere (flat shader so it looks bright and isn't affected by shade) -->
        <a-sphere src="#sun" radius="4" material="shader: flat"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 20000; easing: linear">
        </a-sphere>
        <!-- Sun Light Source -->
        <a-light type="point" color="#ffffff" intensity="2.5" distance="150" decay="1"></a-light>
      </a-entity>

      <!-- ORBIT RINGS -->
      <a-torus radius="7" radius-tubular="0.02" color="#ffffff" opacity="0.3" rotation="90 0 0"></a-torus>
      <a-torus radius="10" radius-tubular="0.02" color="#ffffff" opacity="0.3" rotation="90 0 0"></a-torus>
      <a-torus radius="14" radius-tubular="0.02" color="#ffffff" opacity="0.3" rotation="90 0 0"></a-torus>
      <a-torus radius="18" radius-tubular="0.02" color="#ffffff" opacity="0.3" rotation="90 0 0"></a-torus>
      <a-torus radius="26" radius-tubular="0.02" color="#ffffff" opacity="0.3" rotation="90 0 0"></a-torus>
      <a-torus radius="34" radius-tubular="0.02" color="#ffffff" opacity="0.3" rotation="90 0 0"></a-torus>
      <a-torus radius="43" radius-tubular="0.02" color="#ffffff" opacity="0.3" rotation="90 0 0"></a-torus>
      <a-torus radius="51" radius-tubular="0.02" color="#ffffff" opacity="0.3" rotation="90 0 0"></a-torus>

      <!-- PLANETS AND ORBITS -->

      <!-- Mercury -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 4000; easing: linear">
        <a-sphere src="#mercury" radius="0.4" position="7 0 0" 
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 2000; easing: linear">
        </a-sphere>
      </a-entity>

      <!-- Venus -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 6000; easing: linear">
        <a-sphere src="#venus" radius="0.6" position="10 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 3500; easing: linear">
        </a-sphere>
      </a-entity>

      <!-- Earth and Moon System -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
        <!-- Earth position -->
        <a-entity position="14 0 0">
          <a-sphere src="#earth" normal-map="#earth_normal" radius="0.65" 
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 2500; easing: linear">
          </a-sphere>
          
          <!-- Moon Orbit Ring -->
          <a-torus radius="1.3" radius-tubular="0.01" color="#ffffff" opacity="0.3" rotation="90 0 0"></a-torus>

          <!-- Moon Orbit -->
          <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 1500; easing: linear">
            <a-sphere src="#moon" radius="0.15" position="1.3 0 0"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 1000; easing: linear">
            </a-sphere>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Mars -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 11000; easing: linear">
        <a-sphere src="#mars" radius="0.5" position="18 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 2500; easing: linear">
        </a-sphere>
      </a-entity>

      <!-- Jupiter -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 25000; easing: linear">
        <a-sphere src="#jupiter" radius="2.2" position="26 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 1200; easing: linear">
        </a-sphere>
      </a-entity>

      <!-- Saturn and Rings -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 45000; easing: linear">
        <a-entity position="34 0 0">
          <!-- Saturn axis tilt (approx 26.7 degrees) -->
          <a-entity rotation="26.7 0 0">
            <a-sphere src="#saturn" radius="1.8"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 1300; easing: linear">
            </a-sphere>
            <a-ring src="#saturn_ring" radius-inner="2.2" radius-outer="3.8" rotation="-90 0 0" 
                    material="side: double; transparent: true;">
            </a-ring>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Uranus -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 60000; easing: linear">
        <a-entity position="43 0 0">
          <!-- Uranus axis tilt (approx 98 degrees) -->
          <a-entity rotation="0 0 98">
            <a-sphere src="#uranus" radius="1.2"
                      animation="property: rotation; to: 0 360 0; loop: true; dur: 1500; easing: linear">
            </a-sphere>
          </a-entity>
        </a-entity>
      </a-entity>

      <!-- Neptune -->
      <a-entity animation="property: rotation; to: 0 360 0; loop: true; dur: 85000; easing: linear">
        <a-sphere src="#neptune" radius="1.2" position="51 0 0"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 1600; easing: linear">
        </a-sphere>
      </a-entity>

    </a-scene>
  </body>
</html>
